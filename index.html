<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3U8 Live Stream Viewer</title>

    <!-- hls.js for HLS playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js">
    </script>

    <style>
        /* ───────────── reset & base ───────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #0b0d11;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1000px;
            width: 100%;
            background: #151a22;
            border-radius: 28px;
            padding: 28px 30px 34px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a303c;
            transition: border-color 0.25s;
        }

        .app-container:hover {
            border-color: #3f485a;
        }

        /* ───────────── header ───────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .header .icon {
            font-size: 28px;
            line-height: 1;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f4ff 0%, #94b0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            margin-left: auto;
            font-size: 12px;
            background: #1f2a3a;
            padding: 4px 14px;
            border-radius: 100px;
            color: #9bb1d0;
            border: 1px solid #2d384a;
            letter-spacing: 0.3px;
        }

        /* ───────────── SERVER BUTTONS ───────────── */
        .server-section {
            margin-bottom: 16px;
        }

        .server-section .server-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #6a7f9f;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .server-section .server-label .badge-servers {
            background: #1f2a3a;
            font-size: 11px;
            padding: 0 10px;
            border-radius: 100px;
            color: #8fa2c4;
            font-weight: 400;
            letter-spacing: 0;
        }

        .server-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .server-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 14px;
            border: 1.5px solid #26303f;
            background: #111a24;
            color: #b0c4e0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .server-btn:hover {
            background: #1c283c;
            border-color: #3a4d6a;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .server-btn:active {
            transform: translateY(0px);
        }

        .server-btn .server-icon {
            font-size: 16px;
            opacity: 0.6;
        }

        .server-btn .server-status {
            display: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3be08b;
            box-shadow: 0 0 12px rgba(59, 224, 139, 0.3);
        }

        .server-btn.active {
            background: #1a2a44;
            border-color: #5a7bcf;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 120, 255, 0.15), 0 4px 20px rgba(59, 108, 244, 0.15);
        }

        .server-btn.active .server-status {
            display: inline-block;
        }

        .server-btn .server-shortcut {
            font-size: 11px;
            color: #4f6180;
            font-weight: 400;
            opacity: 0.6;
        }

        /* ───────────── URL bar ───────────── */
        .url-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .url-input-wrapper {
            flex: 1;
            min-width: 220px;
            position: relative;
        }

        .url-input-wrapper input {
            width: 100%;
            padding: 14px 18px;
            background: #0f141c;
            border: 1.5px solid #28303e;
            border-radius: 16px;
            color: #eef3fc;
            font-size: 15px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.2s;
            letter-spacing: 0.2px;
        }

        .url-input-wrapper input:focus {
            border-color: #5a7bcf;
            box-shadow: 0 0 0 4px rgba(74, 120, 255, 0.15);
        }

        .url-input-wrapper input::placeholder {
            color: #4f5a6e;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b6cf4, #5a3fd6);
            color: #fff;
            box-shadow: 0 6px 20px rgba(59, 108, 244, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(59, 108, 244, 0.35);
            background: linear-gradient(135deg, #4d7aff, #6b4fe6);
        }

        .btn-primary:active {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(59, 108, 244, 0.3);
        }

        .btn-secondary {
            background: #1f2a3a;
            color: #c8d6f0;
            border: 1px solid #2f3a4e;
        }

        .btn-secondary:hover {
            background: #2b384c;
            border-color: #40506a;
            color: #fff;
        }

        .btn-success {
            background: #1e8b4c;
            color: #fff;
            box-shadow: 0 4px 16px rgba(30, 139, 76, 0.25);
        }

        .btn-success:hover {
            background: #24a05a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(30, 139, 76, 0.35);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 12px;
        }

        .btn-danger {
            background: #8b2d3a;
            color: #fff;
            border: 1px solid #a03a4a;
        }

        .btn-danger:hover {
            background: #a53a4a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(180, 60, 80, 0.25);
        }

        /* ───────────── action row ───────────── */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .action-row .status-badge {
            font-size: 13px;
            color: #8fa2c4;
            background: #151f2b;
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid #26303f;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-row .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #4f5a6e;
        }

        .action-row .status-badge .dot.active {
            background: #3be08b;
            box-shadow: 0 0 12px rgba(59, 224, 139, 0.4);
        }

        .action-row .status-badge .dot.error {
            background: #f06767;
            box-shadow: 0 0 12px rgba(240, 103, 103, 0.35);
        }

        /* ───────────── video player ───────────── */
        .player-wrapper {
            margin-top: 20px;
            border-radius: 18px;
            overflow: hidden;
            background: #0a0e14;
            position: relative;
            border: 1px solid #212a36;
            transition: border-color 0.3s;
        }

        .player-wrapper:focus-within {
            border-color: #4d70c0;
        }

        #videoPlayer {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #080b10;
            object-fit: contain;
        }

        /* fallback / placeholder overlay */
        .player-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 16 / 9;
            background: #0d121b;
            color: #3f4c62;
            font-size: 15px;
            gap: 12px;
            padding: 30px;
            text-align: center;
            border-radius: 18px;
            user-select: none;
        }

        .player-placeholder .big-icon {
            font-size: 52px;
            opacity: 0.5;
        }

        .player-placeholder .sub {
            font-size: 13px;
            color: #324053;
        }

        .player-wrapper.loading .player-placeholder .big-icon {
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.06);
            }
        }

        /* ───────────── server add row ───────────── */
        .server-add-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .server-add-row input {
            flex: 1;
            min-width: 140px;
            padding: 8px 14px;
            background: #0f141c;
            border: 1.5px solid #28303e;
            border-radius: 12px;
            color: #eef3fc;
            font-size: 13px;
            outline: none;
            transition: border-color 0.25s;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .server-add-row input:focus {
            border-color: #5a7bcf;
            box-shadow: 0 0 0 3px rgba(74, 120, 255, 0.12);
        }

        .server-add-row input::placeholder {
            color: #4f5a6e;
            font-family: 'Segoe UI', sans-serif;
        }

        .server-add-row .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* ───────────── responsive ───────────── */
        @media (max-width: 720px) {
            .app-container {
                padding: 18px 16px 22px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .url-section {
                flex-direction: column;
            }

            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }

            .server-btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .server-btn .server-shortcut {
                display: none;
            }

            .server-add-row input {
                min-width: 120px;
            }
        }

        @media (max-width: 440px) {
            .header .badge {
                display: none;
            }

            .server-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        /* ───────────── utility ───────────── */
        .hidden {
            display: none !important;
        }
        .mt-1 {
            margin-top: 6px;
        }
        .text-ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">

        <!-- HEADER -->
        <div class="header">
            <span class="icon">📺</span>
            <h1>M3U8 Live Viewer</h1>
            <span class="badge">HLS · .m3u8</span>
        </div>

        <!-- ─── SERVER BUTTONS ─── -->
        <div class="server-section" id="serverSection">
            <div class="server-label">
                <span>🖥️ Servers</span>
                <span class="badge-servers" id="serverCount">0</span>
                <span style="font-weight:400;font-size:11px;color:#4f6180;margin-left:4px;">
                    — click to load stream
                </span>
            </div>
            <div class="server-buttons" id="serverButtons">
                <!-- rendered by JS -->
            </div>

            <!-- inline "add server" row -->
            <div class="server-add-row">
                <input type="text" id="newServerName" placeholder="Name (e.g. Server 4)" />
                <input type="text" id="newServerUrl" placeholder="M3U8 URL" />
                <button class="btn btn-secondary btn-sm" id="addServerBtn">➕ Add</button>
                <button class="btn btn-danger btn-sm" id="resetServersBtn" title="Reset to default servers">↺ Reset</button>
            </div>
        </div>

        <!-- URL INPUT -->
        <div class="url-section">
            <div class="url-input-wrapper">
                <input
                type="text"
                id="urlInput"
                placeholder="Paste your .m3u8 URL here…"
                spellcheck="false"
                autofocus
                />
            </div>
            <button class="btn btn-primary" id="loadBtn">
                <span>▶</span> Load &amp; Play
            </button>
        </div>

        <!-- ACTION ROW (status only) -->
        <div class="action-row">
            <div class="status-badge" id="statusBadge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <!-- VIDEO PLAYER -->
        <div class="player-wrapper" id="playerWrapper">
            <video id="videoPlayer" controls playsinline preload="metadata"></video>
            <div class="player-placeholder" id="placeholderOverlay">
                <div class="big-icon">🎬</div>
                <div>Enter an M3U8 URL above</div>
                <div class="sub">Supports HLS live streams · .m3u8</div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ──────────────────────────────────────────────
            const urlInput = document.getElementById('urlInput');
            const loadBtn = document.getElementById('loadBtn');
            const videoEl = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('placeholderOverlay');
            const playerWrapper = document.getElementById('playerWrapper');

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            const serverButtons = document.getElementById('serverButtons');
            const serverCount = document.getElementById('serverCount');
            const newServerName = document.getElementById('newServerName');
            const newServerUrl = document.getElementById('newServerUrl');
            const addServerBtn = document.getElementById('addServerBtn');
            const resetServersBtn = document.getElementById('resetServersBtn');

            // ─── state ──────────────────────────────────────────────────
            const SERVERS_STORAGE_KEY = 'm3u8_viewer_servers';

            const DEFAULT_SERVERS = [{
                name: 'Server 1',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_1750.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }, {
                name: 'Server 2',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_1250.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }, {
                name: 'Server 3',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_750.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }];

            let hlsInstance = null;
            let currentUrl = '';
            let servers = [];
            let activeServerIndex = -1;

            // ─── helpers ──────────────────────────────────────────────

            function loadServersFromStorage() {
                try {
                    const data = localStorage.getItem(SERVERS_STORAGE_KEY);
                    if (data) {
                        const parsed = JSON.parse(data);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            servers = parsed;
                            return;
                        }
                    }
                } catch (_) { /* ignore */ }
                servers = JSON.parse(JSON.stringify(DEFAULT_SERVERS));
            }

            function persistServers() {
                try {
                    localStorage.setItem(SERVERS_STORAGE_KEY, JSON.stringify(servers));
                } catch (_) { /* ignore */ }
                renderServers();
            }

            function setStatus(text, isActive = false, isError = false) {
                statusText.textContent = text;
                statusDot.className = 'dot';
                if (isError) {
                    statusDot.classList.add('error');
                    statusDot.style.background = '#f06767';
                    statusDot.style.boxShadow = '0 0 12px rgba(240,103,103,0.35)';
                } else if (isActive) {
                    statusDot.classList.add('active');
                    statusDot.style.background = '#3be08b';
                    statusDot.style.boxShadow = '0 0 12px rgba(59,224,139,0.4)';
                } else {
                    statusDot.style.background = '#4f5a6e';
                    statusDot.style.boxShadow = 'none';
                }
            }

            // ─── SERVER RENDERING ─────────────────────────────────────

            function renderServers() {
                serverButtons.innerHTML = '';
                serverCount.textContent = servers.length;

                servers.forEach((server, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'server-btn';
                    if (idx === activeServerIndex) {
                        btn.classList.add('active');
                    }

                    const statusSpan = document.createElement('span');
                    statusSpan.className = 'server-status';

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = server.name;

                    const shortcutSpan = document.createElement('span');
                    shortcutSpan.className = 'server-shortcut';
                    shortcutSpan.textContent = `[${idx + 1}]`;

                    btn.appendChild(statusSpan);
                    btn.appendChild(nameSpan);
                    btn.appendChild(shortcutSpan);

                    // click → load this server's URL
                    btn.addEventListener('click', () => {
                        loadUrl(server.url);
                        setActiveServer(idx);
                        urlInput.value = server.url;
                        setStatus(`Loaded ${server.name}`, true);
                    });

                    // right-click → remove server (if more than 1)
                    btn.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        if (servers.length <= 1) {
                            setStatus('Cannot remove the last server', false, true);
                            return;
                        }
                        if (confirm(`Remove "${server.name}"?`)) {
                            servers.splice(idx, 1);
                            if (activeServerIndex === idx) activeServerIndex = -1;
                            else if (activeServerIndex > idx) activeServerIndex--;
                            persistServers();
                            setStatus(`Removed ${server.name}`, false);
                        }
                    });

                    serverButtons.appendChild(btn);
                });
            }

            function setActiveServer(idx) {
                activeServerIndex = idx;
                const btns = serverButtons.querySelectorAll('.server-btn');
                btns.forEach((btn, i) => {
                    btn.classList.toggle('active', i === idx);
                });
            }

            function clearActiveServer() {
                activeServerIndex = -1;
                const btns = serverButtons.querySelectorAll('.server-btn');
                btns.forEach((btn) => btn.classList.remove('active'));
            }

            // ─── video / HLS ──────────────────────────────────────────

            function destroyHls() {
                if (hlsInstance) {
                    try {
                        hlsInstance.destroy();
                    } catch (_) { /* ignore */ }
                    hlsInstance = null;
                }
                if (videoEl) {
                    videoEl.removeAttribute('src');
                    videoEl.load();
                }
            }

            function loadUrl(url) {
                if (!url || !url.trim()) {
                    setStatus('Please enter a URL', false, true);
                    return;
                }

                const trimmed = url.trim();
                if (!trimmed.startsWith('http://') && !trimmed.startsWith('https://')) {
                    setStatus('Invalid URL (must start with http:// or https://)', false, true);
                    return;
                }

                if (!trimmed.includes('.m3u8')) {
                    setStatus('Warning: URL does not contain .m3u8 — trying anyway…', false);
                }

                currentUrl = trimmed;
                urlInput.value = trimmed;

                placeholder.classList.remove('hidden');
                placeholder.querySelector('.big-icon').textContent = '⏳';
                placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent = 'Loading stream…';
                placeholder.querySelector('.sub').textContent = 'Please wait';
                playerWrapper.classList.add('loading');
                setStatus('Loading…', true);

                destroyHls();

                // Native HLS (Safari)
                if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                    videoEl.src = trimmed;
                    videoEl.play().catch((err) => {
                        console.warn('Native playback error:', err);
                        setStatus('Native HLS error — try another browser', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '⚠️';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Playback error';
                        placeholder.querySelector('.sub').textContent = err.message || 'Unknown error';
                    });
                    videoEl.addEventListener('loadedmetadata', () => {
                        placeholder.classList.add('hidden');
                        playerWrapper.classList.remove('loading');
                        setStatus('Playing (native HLS)', true);
                    }, { once: true });
                    videoEl.addEventListener('error', () => {
                        setStatus('Native HLS error', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '❌';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Playback failed';
                        placeholder.querySelector('.sub').textContent =
                            'Check the URL or try a different browser';
                    }, { once: true });
                    return;
                }

                // hls.js
                if (!Hls.isSupported()) {
                    setStatus('HLS not supported in this browser', false, true);
                    placeholder.querySelector('.big-icon').textContent = '🚫';
                    placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                        'HLS not supported';
                    placeholder.querySelector('.sub').textContent =
                        'Please use a modern browser (Chrome, Edge, Firefox)';
                    playerWrapper.classList.remove('loading');
                    return;
                }

                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backbufferLength: 30,
                });

                hlsInstance = hls;

                hls.attachMedia(videoEl);

                hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                    hls.loadSource(trimmed);
                    setStatus('Loading source…', true);
                });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    placeholder.classList.add('hidden');
                    playerWrapper.classList.remove('loading');
                    setStatus('Playing (HLS.js)', true);
                    videoEl.play().catch((err) => {
                        console.warn('Autoplay blocked:', err);
                        setStatus('Ready — click play', true);
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        setStatus('Fatal HLS error', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '❌';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Stream error';
                        placeholder.querySelector('.sub').textContent =
                            data.details || 'Could not load stream';
                        if (hlsInstance) {
                            hlsInstance.destroy();
                            hlsInstance = null;
                        }
                    } else {
                        setStatus('HLS warning: ' + (data.details || ''), false);
                    }
                });

                const timeout = setTimeout(() => {
                    if (!placeholder.classList.contains('hidden')) {
                        placeholder.querySelector('.sub').textContent =
                            'Still loading… check your connection';
                    }
                }, 8000);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    clearTimeout(timeout);
                });

                hls.on(Hls.Events.ERROR, () => {
                    clearTimeout(timeout);
                });
            }

            // ─── add server ───────────────────────────────────────────

            function addServer() {
                const name = newServerName.value.trim();
                const url = newServerUrl.value.trim();
                if (!name) {
                    setStatus('Please enter a server name', false, true);
                    return;
                }
                if (!url) {
                    setStatus('Please enter a server URL', false, true);
                    return;
                }
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    setStatus('Invalid URL — must start with http:// or https://', false, true);
                    return;
                }
                if (servers.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                    setStatus(`Server "${name}" already exists`, false, true);
                    return;
                }
                servers.push({ name, url });
                persistServers();
                newServerName.value = '';
                newServerUrl.value = '';
                setStatus(`Added "${name}" ✓`, false);
            }

            // ─── reset servers ────────────────────────────────────────

            function resetServers() {
                if (servers.length === DEFAULT_SERVERS.length &&
                    servers.every((s, i) => s.name === DEFAULT_SERVERS[i].name && s.url === DEFAULT_SERVERS[i].url)) {
                    setStatus('Already using default servers', false);
                    return;
                }
                if (confirm('Reset to default server list?')) {
                    servers = JSON.parse(JSON.stringify(DEFAULT_SERVERS));
                    activeServerIndex = -1;
                    persistServers();
                    setStatus('Reset to default servers', false);
                }
            }

            // ─── init ──────────────────────────────────────────────────

            function init() {
                loadServersFromStorage();
                renderServers();

                // pre-fill default URL from first server if available
                if (servers.length > 0 && servers[0].url) {
                    urlInput.value = servers[0].url;
                }

                // ── event listeners ──

                loadBtn.addEventListener('click', () => {
                    const val = urlInput.value.trim();
                    if (val) {
                        loadUrl(val);
                        clearActiveServer();
                    } else {
                        setStatus('Please enter a URL', false, true);
                    }
                });

                addServerBtn.addEventListener('click', addServer);

                resetServersBtn.addEventListener('click', resetServers);

                // Enter key on URL input
                urlInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const val = urlInput.value.trim();
                        if (val) {
                            loadUrl(val);
                            clearActiveServer();
                        } else {
                            setStatus('Please enter a URL', false, true);
                        }
                    }
                });

                // Enter key on new server name/url fields
                newServerName.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (newServerUrl.value.trim()) {
                            addServer();
                        } else {
                            newServerUrl.focus();
                        }
                    }
                });
                newServerUrl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addServer();
                    }
                });

                // video events
                videoEl.addEventListener('play', () => {
                    placeholder.classList.add('hidden');
                    playerWrapper.classList.remove('loading');
                    setStatus('Playing', true);
                });

                videoEl.addEventListener('pause', () => {
                    if (!videoEl.src) return;
                    setStatus('Paused', false);
                });

                videoEl.addEventListener('ended', () => {
                    setStatus('Stream ended', false);
                });

                videoEl.addEventListener('error', (e) => {
                    if (videoEl.error) {
                        setStatus('Video error: ' + (videoEl.error.message || ''), false, true);
                    }
                });

                setStatus('Ready — click a server or paste URL');
            }

            // ─── start ──────────────────────────────────────────────────
            init();
        })();
    </script>

</body>
</html>
