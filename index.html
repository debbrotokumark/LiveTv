<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3U8 Live Stream Viewer</title>

    <!-- hls.js for HLS playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js">
    </script>

    <style>
        /* ───────────── full-screen reset ───────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0d11;
            color: #e8edf5;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        /* ───────────── container ───────────── */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 20px 24px 24px 24px;
            background: #0b0d11;
            gap: 14px;
        }

        /* ───────────── header ───────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header .icon {
            font-size: 28px;
            line-height: 1;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f4ff 0%, #94b0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            margin-left: auto;
            font-size: 12px;
            background: #1f2a3a;
            padding: 4px 14px;
            border-radius: 100px;
            color: #9bb1d0;
            border: 1px solid #2d384a;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        /* ───────────── SERVER BUTTONS ───────────── */
        .server-section {
            flex-shrink: 0;
        }

        .server-section .server-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #6a7f9f;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .server-section .server-label .badge-servers {
            background: #1f2a3a;
            font-size: 11px;
            padding: 0 10px;
            border-radius: 100px;
            color: #8fa2c4;
            font-weight: 400;
            letter-spacing: 0;
        }

        .server-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .server-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 14px;
            border: 1.5px solid #26303f;
            background: #111a24;
            color: #b0c4e0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .server-btn:hover {
            background: #1c283c;
            border-color: #3a4d6a;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .server-btn:active {
            transform: translateY(0px);
        }

        .server-btn .server-status {
            display: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3be08b;
            box-shadow: 0 0 12px rgba(59, 224, 139, 0.3);
        }

        .server-btn.active {
            background: #1a2a44;
            border-color: #5a7bcf;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 120, 255, 0.15), 0 4px 20px rgba(59, 108, 244, 0.15);
        }

        .server-btn.active .server-status {
            display: inline-block;
        }

        .server-btn .server-shortcut {
            font-size: 11px;
            color: #4f6180;
            font-weight: 400;
            opacity: 0.6;
        }

        /* ───────────── status row ───────────── */
        .action-row {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2px;
        }

        .action-row .status-badge {
            font-size: 13px;
            color: #8fa2c4;
            background: #151f2b;
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid #26303f;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-row .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #4f5a6e;
        }

        .action-row .status-badge .dot.active {
            background: #3be08b;
            box-shadow: 0 0 12px rgba(59, 224, 139, 0.4);
        }

        .action-row .status-badge .dot.error {
            background: #f06767;
            box-shadow: 0 0 12px rgba(240, 103, 103, 0.35);
        }

        /* ───────────── video player (fills remaining space) ───────────── */
        .player-wrapper {
            flex: 1;
            min-height: 0;
            border-radius: 18px;
            overflow: hidden;
            background: #0a0e14;
            position: relative;
            border: 1px solid #212a36;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            display: block;
            background: #080b10;
            object-fit: contain;
        }

        /* placeholder overlay */
        .player-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #0d121b;
            color: #3f4c62;
            font-size: 15px;
            gap: 12px;
            padding: 30px;
            text-align: center;
            user-select: none;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 18px;
            pointer-events: none;
        }

        .player-placeholder .big-icon {
            font-size: 52px;
            opacity: 0.5;
        }

        .player-placeholder .sub {
            font-size: 13px;
            color: #324053;
        }

        .player-wrapper.loading .player-placeholder .big-icon {
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.06);
            }
        }

        .hidden {
            display: none !important;
        }

        /* ───────────── responsive tweaks ───────────── */
        @media (max-width: 720px) {
            .app-container {
                padding: 14px 16px 16px 16px;
                gap: 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .server-btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .server-btn .server-shortcut {
                display: none;
            }

            .player-wrapper {
                border-radius: 12px;
            }
        }

        @media (max-width: 440px) {
            .header .badge {
                display: none;
            }

            .server-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">

        <!-- HEADER -->
        <div class="header">
            <span class="icon">📺</span>
            <h1>M3U8 Live Viewer</h1>
            <span class="badge">HLS · .m3u8</span>
        </div>

        <!-- ─── SERVER BUTTONS ─── -->
        <div class="server-section" id="serverSection">
            <div class="server-label">
                <span>🖥️ Servers</span>
                <span class="badge-servers" id="serverCount">0</span>
                <span style="font-weight:400;font-size:11px;color:#4f6180;margin-left:4px;">
                    — click to load stream
                </span>
            </div>
            <div class="server-buttons" id="serverButtons">
                <!-- rendered by JS -->
            </div>
        </div>

        <!-- STATUS ROW -->
        <div class="action-row">
            <div class="status-badge" id="statusBadge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <!-- VIDEO PLAYER (fills remaining height) -->
        <div class="player-wrapper" id="playerWrapper">
            <video id="videoPlayer" controls playsinline preload="metadata"></video>
            <div class="player-placeholder" id="placeholderOverlay">
                <div class="big-icon">🎬</div>
                <div>Select a server to start</div>
                <div class="sub">HLS live streams · .m3u8</div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ──────────────────────────────────────────────
            const videoEl = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('placeholderOverlay');
            const playerWrapper = document.getElementById('playerWrapper');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const serverButtons = document.getElementById('serverButtons');
            const serverCount = document.getElementById('serverCount');

            // ─── state ──────────────────────────────────────────────────
            const SERVERS_STORAGE_KEY = 'm3u8_viewer_servers';

            const DEFAULT_SERVERS = [{
                name: 'Server 1',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_1750.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }, {
                name: 'Server 2',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_1250.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }, {
                name: 'Server 3',
                url: 'https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/sst/0/master_750.m3u8?hdntl=Expires=1782840485~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclC0uaUD73C5ioeXBuP0KQMiPascuZsxuBTSptw2XJObY_EOhdDMuAf-SEpA-2Gvu0BSh1oStm4smvxA70eui14P'
            }];

            let hlsInstance = null;
            let servers = [];
            let activeServerIndex = -1;

            // ─── helpers ──────────────────────────────────────────────

            function loadServersFromStorage() {
                try {
                    const data = localStorage.getItem(SERVERS_STORAGE_KEY);
                    if (data) {
                        const parsed = JSON.parse(data);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            servers = parsed;
                            return;
                        }
                    }
                } catch (_) { /* ignore */ }
                servers = JSON.parse(JSON.stringify(DEFAULT_SERVERS));
            }

            function persistServers() {
                try {
                    localStorage.setItem(SERVERS_STORAGE_KEY, JSON.stringify(servers));
                } catch (_) { /* ignore */ }
                renderServers();
            }

            function setStatus(text, isActive = false, isError = false) {
                statusText.textContent = text;
                statusDot.className = 'dot';
                if (isError) {
                    statusDot.classList.add('error');
                    statusDot.style.background = '#f06767';
                    statusDot.style.boxShadow = '0 0 12px rgba(240,103,103,0.35)';
                } else if (isActive) {
                    statusDot.classList.add('active');
                    statusDot.style.background = '#3be08b';
                    statusDot.style.boxShadow = '0 0 12px rgba(59,224,139,0.4)';
                } else {
                    statusDot.style.background = '#4f5a6e';
                    statusDot.style.boxShadow = 'none';
                }
            }

            // ─── SERVER RENDERING ─────────────────────────────────────

            function renderServers() {
                serverButtons.innerHTML = '';
                serverCount.textContent = servers.length;

                servers.forEach((server, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'server-btn';
                    if (idx === activeServerIndex) {
                        btn.classList.add('active');
                    }

                    const statusSpan = document.createElement('span');
                    statusSpan.className = 'server-status';

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = server.name;

                    const shortcutSpan = document.createElement('span');
                    shortcutSpan.className = 'server-shortcut';
                    shortcutSpan.textContent = `[${idx + 1}]`;

                    btn.appendChild(statusSpan);
                    btn.appendChild(nameSpan);
                    btn.appendChild(shortcutSpan);

                    // click → load this server's URL
                    btn.addEventListener('click', () => {
                        loadUrl(server.url);
                        setActiveServer(idx);
                        setStatus(`Loaded ${server.name}`, true);
                    });

                    // right-click → remove server (if more than 1)
                    btn.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        if (servers.length <= 1) {
                            setStatus('Cannot remove the last server', false, true);
                            return;
                        }
                        if (confirm(`Remove "${server.name}"?`)) {
                            servers.splice(idx, 1);
                            if (activeServerIndex === idx) activeServerIndex = -1;
                            else if (activeServerIndex > idx) activeServerIndex--;
                            persistServers();
                            setStatus(`Removed ${server.name}`, false);
                        }
                    });

                    serverButtons.appendChild(btn);
                });
            }

            function setActiveServer(idx) {
                activeServerIndex = idx;
                const btns = serverButtons.querySelectorAll('.server-btn');
                btns.forEach((btn, i) => {
                    btn.classList.toggle('active', i === idx);
                });
            }

            function clearActiveServer() {
                activeServerIndex = -1;
                const btns = serverButtons.querySelectorAll('.server-btn');
                btns.forEach((btn) => btn.classList.remove('active'));
            }

            // ─── video / HLS ──────────────────────────────────────────

            function destroyHls() {
                if (hlsInstance) {
                    try {
                        hlsInstance.destroy();
                    } catch (_) { /* ignore */ }
                    hlsInstance = null;
                }
                if (videoEl) {
                    videoEl.removeAttribute('src');
                    videoEl.load();
                }
            }

            function loadUrl(url) {
                if (!url || !url.trim()) {
                    setStatus('Invalid URL', false, true);
                    return;
                }

                const trimmed = url.trim();
                if (!trimmed.startsWith('http://') && !trimmed.startsWith('https://')) {
                    setStatus('Invalid URL (must start with http:// or https://)', false, true);
                    return;
                }

                // Show placeholder with loading state
                placeholder.classList.remove('hidden');
                placeholder.querySelector('.big-icon').textContent = '⏳';
                placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent = 'Loading stream…';
                placeholder.querySelector('.sub').textContent = 'Please wait';
                playerWrapper.classList.add('loading');
                setStatus('Loading…', true);

                destroyHls();

                // Native HLS (Safari)
                if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                    videoEl.src = trimmed;
                    videoEl.play().catch((err) => {
                        console.warn('Native playback error:', err);
                        setStatus('Native HLS error — try another browser', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '⚠️';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Playback error';
                        placeholder.querySelector('.sub').textContent = err.message || 'Unknown error';
                    });
                    videoEl.addEventListener('loadedmetadata', () => {
                        placeholder.classList.add('hidden');
                        playerWrapper.classList.remove('loading');
                        setStatus('Playing (native HLS)', true);
                    }, { once: true });
                    videoEl.addEventListener('error', () => {
                        setStatus('Native HLS error', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '❌';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Playback failed';
                        placeholder.querySelector('.sub').textContent =
                            'Check the URL or try a different browser';
                    }, { once: true });
                    return;
                }

                // hls.js
                if (!Hls.isSupported()) {
                    setStatus('HLS not supported in this browser', false, true);
                    placeholder.querySelector('.big-icon').textContent = '🚫';
                    placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                        'HLS not supported';
                    placeholder.querySelector('.sub').textContent =
                        'Please use a modern browser (Chrome, Edge, Firefox)';
                    playerWrapper.classList.remove('loading');
                    return;
                }

                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backbufferLength: 30,
                });

                hlsInstance = hls;

                hls.attachMedia(videoEl);

                hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                    hls.loadSource(trimmed);
                    setStatus('Loading source…', true);
                });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    placeholder.classList.add('hidden');
                    playerWrapper.classList.remove('loading');
                    setStatus('Playing (HLS.js)', true);
                    videoEl.play().catch((err) => {
                        console.warn('Autoplay blocked:', err);
                        setStatus('Ready — click play', true);
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        setStatus('Fatal HLS error', false, true);
                        placeholder.classList.remove('hidden');
                        playerWrapper.classList.remove('loading');
                        placeholder.querySelector('.big-icon').textContent = '❌';
                        placeholder.querySelector('div:not(.big-icon):not(.sub)').textContent =
                            'Stream error';
                        placeholder.querySelector('.sub').textContent =
                            data.details || 'Could not load stream';
                        if (hlsInstance) {
                            hlsInstance.destroy();
                            hlsInstance = null;
                        }
                    } else {
                        setStatus('HLS warning: ' + (data.details || ''), false);
                    }
                });

                const timeout = setTimeout(() => {
                    if (!placeholder.classList.contains('hidden')) {
                        placeholder.querySelector('.sub').textContent =
                            'Still loading… check your connection';
                    }
                }, 8000);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    clearTimeout(timeout);
                });

                hls.on(Hls.Events.ERROR, () => {
                    clearTimeout(timeout);
                });
            }

            // ─── init ──────────────────────────────────────────────────

            function init() {
                loadServersFromStorage();
                renderServers();

                // pre-fill placeholder message
                setStatus('Ready — click a server');

                // video events
                videoEl.addEventListener('play', () => {
                    placeholder.classList.add('hidden');
                    playerWrapper.classList.remove('loading');
                    setStatus('Playing', true);
                });

                videoEl.addEventListener('pause', () => {
                    if (!videoEl.src) return;
                    setStatus('Paused', false);
                });

                videoEl.addEventListener('ended', () => {
                    setStatus('Stream ended', false);
                });

                videoEl.addEventListener('error', (e) => {
                    if (videoEl.error) {
                        setStatus('Video error: ' + (videoEl.error.message || ''), false, true);
                    }
                });
            }

            // ─── start ──────────────────────────────────────────────────
            init();
        })();
    </script>

</body>
</html>
